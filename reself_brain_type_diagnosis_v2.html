<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Re:Self 脳タイプ診断</title>
<style>
:root {
  --pink:#ee6f9e; --deep:#d93b76; --light:#fff5f8; --gold:#d7a74f; --text:#3f2f2f; --soft:#fce8f0;
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",YuGothic,Meiryo,sans-serif;
  background:linear-gradient(180deg,#fff7fa,#fffdf8); color:var(--text); line-height:1.8;
}
.header {
  position:sticky; top:0; z-index:5; background:rgba(255,255,255,.9); backdrop-filter:blur(8px);
  border-bottom:1px solid #f4cdda; text-align:center; padding:10px 12px; font-weight:700; color:#5c3b42;
}
.wrap { max-width:780px; margin:0 auto; padding:20px 14px 42px; }
.card {
  background:rgba(255,255,255,.96); border:1px solid #f4cfda; border-radius:28px;
  box-shadow:0 14px 42px rgba(210,112,142,.14); padding:24px; overflow:hidden;
}
.logo { text-align:center; color:var(--deep); font-weight:800; letter-spacing:.03em; }
h1 { text-align:center; color:var(--deep); font-size:clamp(28px,8vw,44px); line-height:1.25; margin:6px 0 12px; }
h2 { text-align:center; color:var(--deep); font-size:clamp(22px,6vw,34px); line-height:1.35; margin:8px 0 12px; }
.subtitle { text-align:center; font-size:15px; color:#8a6d6d; margin-bottom:18px; }
.hero { display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; margin:12px 0 18px; }
.tiara { width:min(230px,55vw); border-radius:24px; }
.speech {
  flex:1; min-width:260px; background:#fff; border:2px solid #f5c9d6; border-radius:24px;
  padding:18px; box-shadow:0 8px 22px rgba(217,59,118,.08); font-weight:600;
}
.btn {
  display:block; width:100%; border:0; border-radius:999px; padding:17px 18px; margin:14px 0;
  font-size:18px; font-weight:800; color:#fff; background:linear-gradient(135deg,var(--pink),var(--deep));
  box-shadow:0 10px 20px rgba(217,59,118,.22); cursor:pointer; text-align:center;
}
.btn.secondary { background:#fff; color:var(--deep); border:2px solid #f1c4d2; box-shadow:none; }
.hidden { display:none; }
.progress { height:10px; background:#fde6ee; border-radius:999px; overflow:hidden; margin:14px 0 22px; }
.bar { height:100%; width:0%; background:linear-gradient(90deg,var(--pink),var(--deep)); transition:.3s; }
.qnum { color:var(--deep); font-weight:800; text-align:center; }
.question { font-size:22px; font-weight:800; text-align:center; margin:12px 0 22px; }
.choice {
  width:100%; background:#fff; border:2px solid #f3cfda; border-radius:20px; padding:16px;
  margin:10px 0; font-size:17px; font-weight:700; color:#5a4147; cursor:pointer;
}
.choice:hover { border-color:var(--pink); background:#fff6f9; }
.result-title { text-align:center; }
.badge {
  display:inline-flex; align-items:center; justify-content:center; width:74px; height:74px; border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--deep)); color:#fff; font-size:36px; font-weight:900;
  box-shadow:0 8px 20px rgba(217,59,118,.2); margin-bottom:10px;
}
.result-card {
  border:1px solid #f4cfda; border-radius:22px; padding:18px; background:#fffafb; margin:16px 0;
}
.result-card h3 { margin:0 0 8px; color:var(--deep); text-align:center; font-size:22px; }
.grid { display:grid; grid-template-columns:1fr; gap:12px; }
.panel { border:1px solid #f4cfda; border-radius:18px; padding:15px; background:#fff; }
.panel h4 { margin:0 0 8px; color:#7c545e; text-align:center; }
ul { padding-left:1.2em; margin:8px 0; }
.note {
  background:#fff7fa; border:1px solid #f4cfda; border-radius:22px; padding:18px; margin:18px 0; text-align:center;
}
.small { font-size:13px; color:#8a6d6d; text-align:center; }
.scores { font-size:13px; color:#8a6d6d; text-align:center; margin-top:18px; }
@media (min-width:700px) { .grid { grid-template-columns:repeat(3,1fr); } }
</style>
</head>

      これから18個の質問に答えながら、あなたの脳のクセを一緒に見つけていきましょう♪<br><br>
      正解・不正解はありません。<br>
      「本当はどう感じているかな？」と、自分の心にそっと聞いてみてくださいね♡<br><br>
      深く考えすぎず、直感で答えてみてください♪<br>
      それでは、スタートです♡
    </div>
  </div>
  <button class="btn" onclick="startQuiz()">診断スタート</button>
</section>

<section id="quiz" class="card hidden">
  <div class="logo">Re:Self 脳タイプ診断</div>
  <div class="progress"><div id="bar" class="bar"></div></div>
  <div id="qnum" class="qnum"></div>
  <div id="question" class="question"></div>
  <div id="choices"></div>
</section>

<section id="result" class="card hidden">
  <div class="logo">Re:Self 脳タイプ診断</div>
  <div id="resultInner"></div>
  <button class="btn secondary" onclick="restart()">もう一度診断する</button>
</section>
</div>

<script>
const questions = ["つい自分を後回しにして、人のことを優先してしまうことが多い", "嫌われたくなくて、本当の気持ちを言えないことがある", "周りの期待に応えようと頑張りすぎて、疲れてしまうことがある", "「ちゃんとしなきゃ」と完璧を目指してしまうことが多い", "自分のことより、「人の役に立つこと」にやりがいを感じる", "頼まれると断れず、抱え込みすぎてしまうことがある", "新しいことや変化にワクワクするより、少し不安を感じやすい", "自分の気持ちや考えを言葉にするのが苦手なときがある", "人と一緒にいると気を遣い、ひとりの時間がないと疲れてしまう", "感情の波が激しく、落ち込むとなかなか立ち直れない", "ネガティブな未来をつい想像して、不安になることが多い", "自分に自信が持てず、「私なんて…」と思ってしまうことがある", "本当はやりたいことがあるのに、「私には無理」とあきらめてしまうことが多い", "人からの「嬉しい言葉」や「好意」を素直に受け取るのが苦手なときがある", "幸せになることに対して、どこか罪悪感や抵抗を感じてしまう", "頑張っているのに、なぜかいつも「満たされない」と感じてしまう", "「ちゃんとしなきゃ」「もっと〇〇すべき」と、自分に厳しくなりすぎてしまう", "自分の気持ちよりも、相手や周りを優先してしまうことが多い"];
const typeInfo = [{"key": "①", "name": "安心優先タイプ", "sub": "ぬるま湯のホメオスタシスタイプ", "lead": "脳の「いつも通りを維持しよう」とする働きが強く、変化よりも安心を優先しやすいタイプです。", "states": ["本当は変わりたい", "でも今のままが楽", "大きな不満はない", "気づけば同じ毎日"], "brain": "「今は安全だから、そのままでいよう」", "message": "あなたに必要なのは、頑張ることではなく、小さな変化を許可すること♡"}, {"key": "②", "name": "分析好きの完璧思考タイプ", "sub": "", "lead": "物事を深く考え、納得してから動きたいあなた。その慎重さと探究心が、信頼につながります。", "states": ["完璧にやらないと気がすまない", "失敗を極端に恐れてしまう", "考えすぎて行動が遅くなる", "自分に厳しく疲れやすい"], "brain": "「まだ準備が足りないかも…もっと完璧にしなくちゃ」", "message": "あなたに必要なのは、完璧よりも「できたこと」に目を向けること♡"}, {"key": "③", "name": "がんばり屋さんタイプ", "sub": "脳内エネルギー枯渇タイプ", "lead": "真面目で責任感が強く、人の役に立ちたい思いが人一倍。気づかないうちに、心も体もオーバーヒートしやすいタイプです。", "states": ["やることが多すぎて常に忙しい", "休んでも罪悪感がある", "気づくと体調を崩しやすい", "「ちゃんとしなきゃ」が口癖", "頼られると断れない"], "brain": "「もう十分がんばってるよ。ゆっくり休んでも大丈夫」", "message": "あなたに必要なのは、もっと頑張ることではなく、自分をいたわること♡ 休むことは悪くないよ"}, {"key": "④", "name": "直感ひらめきのアイデアクリエイタータイプ", "sub": "", "lead": "ひらめきや感性にあふれ、自由な発想で未来を描けるあなた。その柔軟さと想像力が、周りをワクワクさせます。", "states": ["ひらめきが止まらずワクワクする", "飽きっぽくて続かないことも", "周囲やルールが窮屈に感じる", "気分の波が大きくなることがある", "考えすぎると迷子になりがち"], "brain": "「あなたのひらめきは、誰かの未来を照らす光だよ」", "message": "あなたに必要なのは、もっと自由に、のびのびと自分の「好き」を信じてワクワクを形にしてね♡"}, {"key": "⑤", "name": "慎重じっくりの調和サポータータイプ", "sub": "", "lead": "周りをよく見て、そっと支えるやさしさを持つあなた。その思いやりと安定感が、人との信頼を育みます。", "states": ["人の気持ちに敏感で気をつかう", "変化に慎重で、決断に時間がかかる", "安心・安定を大切にしたい", "周りとのバランスを大事にする", "自分の気持ちを後回しにしがち"], "brain": "「そのやさしさは、ちゃんとあなたの強さだよ。自分も大切にしてね」", "message": "あなたに必要なのは、もっと自分を責めることじゃなくて「自分も満たしながら、人を支えること」♡"}, {"key": "⑥", "name": "幸せ警戒タイプ", "sub": "", "lead": "幸せになることに、どこかブレーキをかけてしまうあなた。過去の経験から、「幸せ＝リスク」と感じてしまいやすいタイプです。", "states": ["幸せを感じると不安になる", "「どうせ続かない」と思ってしまう", "人の優しさを素直に受け取れない", "変化やチャンスにブレーキをかける", "頑張っているのに満たされない"], "brain": "「幸せになることは怖いことじゃないよ。安心の中で、受け取っていいんだよ」", "message": "あなたに必要なのは、幸せを疑うことではなく、幸せを受け取る練習をすること♡ その優しさは、あなたのものだよ"}];
const choices = [
  ["当てはまる",3],
  ["まぁまぁ当てはまる",2],
  ["あまり当てはまらない",1],
  ["全く当てはまらない",0]
];
let current = 0;
let answers = new Array(questions.length).fill(null);

function $(id) { return document.getElementById(id); }

function startQuiz() {
  $("start").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  current = 0;
  answers = new Array(questions.length).fill(null);
  renderQuestion();
}

function renderQuestion() {
  $("qnum").textContent = "質問 " + (current + 1) + " / " + questions.length;
  $("question").textContent = questions[current];
  $("bar").style.width = ((current) / questions.length * 100) + "%";
  const box = $("choices");
  box.innerHTML = "";
  choices.forEach(([label, score]) => {
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = label + "（" + score + "点）";
    b.onclick = () => {
      answers[current] = score;
      current++;
      if (current < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    };
    box.appendChild(b);
  });
}

function calcScores() {
  const scores = [0,0,0,0,0,0];
  answers.forEach((v,i) => {
    const idx = Math.floor(i / 3);
    scores[idx] += v || 0;
  });
  return scores;
}

function resultBlock(t) {
  return `
    <div class="result-card">
      <div class="result-title"><div class="badge">${t.key}</div></div>
      <h2>${t.name}</h2>
      ${t.sub ? `<p class="subtitle">（${t.sub}）</p>` : ""}
      <p>${t.lead}</p>
      <div class="grid">
        <div class="panel"><h4>🌸 よくある状態</h4><ul>${t.states.map(s=>`<li>${s}</li>`).join("")}</ul></div>
        <div class="panel"><h4>🌸 脳からのメッセージ</h4><p><strong>${t.brain}</strong></p></div>
        <div class="panel"><h4>🌸 一言メッセージ</h4><p><strong>${t.message}</strong></p></div>
      </div>
    </div>`;
}

function showResult() {
  $("quiz").classList.add("hidden");
  $("result").classList.remove("hidden");
  $("bar").style.width = "100%";
  const scores = calcScores();
  const max = Math.max(...scores);
  const winners = scores.map((s,i)=>s===max?i:null).filter(i=>i!==null);

  let title = "";
  if (winners.length === 1) {
    title = `<h1>あなたの脳タイプは…</h1>`;
  } else {
    title = `<h1>あなたは複数の脳タイプを持っています</h1>
    <p class="subtitle">同じ点数のタイプがありました。どちらも今のあなたにある大切な特徴です♡</p>`;
  }

  const blocks = winners.map(i => resultBlock(typeInfo[i])).join("");

  const note = `
    <div class="note">
      <h3>もっと自分を知りたいあなたへ</h3>
      <p><strong>人はひとつの脳タイプだけを持っているわけではありません。</strong></p>
      <p>その時の環境や経験によって、いくつかのタイプの特徴を持ちながら生きています。</p>
      <p>今回の結果は、<strong>今のあなたを知るためのヒント</strong>です♡</p>
      <hr style="border:none;border-top:1px solid #f4cfda;margin:18px 0;">
      <p><strong>無料脳タイプ診断会では、</strong><br>
      あなたの才能の種🌱・無意識の脳のクセ🧠・あなたを止めているブレーキを一緒に整理していきます。</p>
      <p>参加者には、あなただけの<strong>「脳タイプ取扱説明書」</strong>をプレゼント🎁</p>
      <p>ここでしか受け取れない特別資料で、才能の活かし方・脳のクセとの付き合い方・ブレーキ解除ワークを受け取ることができます♡</p>
      <p><strong>個別相談をご希望の方は、LINE公式アカウントのリッチメニューよりお申し込みください。</strong></p>
      <p><strong>診断会は不定期で開催しています。開催のお知らせをお待ちくださいね♡</strong></p>
    </div>`;

  const scoreText = scores.map((s,i)=>`${typeInfo[i].key}${typeInfo[i].name}：${s}点`).join(" / ");
  $("resultInner").innerHTML = title + blocks + note + `<div class="scores">${scoreText}</div>`;
  window.scrollTo(0,0);
}

function restart() {
  $("result").classList.add("hidden");
  $("start").classList.remove("hidden");
  window.scrollTo(0,0);
}
</script>
</body>
</html>
